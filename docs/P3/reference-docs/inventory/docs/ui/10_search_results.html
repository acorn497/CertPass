<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>검색 결과 — 소모품 재고</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-note">10. 검색 결과</div>

<!-- App Bar -->
<div class="app-bar">
  <h1>우리집 재고</h1>
</div>

<!-- Search Bar (active) -->
<div class="search-bar">
  <div class="search-input-wrap" style="border:1.5px solid var(--primary); border-radius:9999px">
    <span class="icon">🔍</span>
    <input type="text" placeholder="상품명으로 검색" value="우유">
  </div>
  <button class="scan-button" title="바코드 스캔 검색">📷</button>
</div>

<!-- Results -->
<div class="section-header">
  검색 결과 <span style="color:var(--primary); font-weight:700">2</span>
</div>

<div class="product-list">
  <div class="product-card">
    <div class="product-info">
      <div class="product-name">서울<span style="background:#bfdbfe;padding:1px 2px;border-radius:3px">우유</span> 1L</div>
      <div class="product-meta">
        <span>냉장고</span>
        <span>·</span>
        <span>재고 2건</span>
      </div>
    </div>
    <div class="product-quantity">×3</div>
  </div>

  <div class="product-card">
    <div class="product-info">
      <div class="product-name">매일 초콜릿<span style="background:#bfdbfe;padding:1px 2px;border-radius:3px">우유</span></div>
      <div class="product-meta">
        <span>냉장고</span>
        <span>·</span>
        <span>재고 1건</span>
      </div>
    </div>
    <div class="product-quantity">×1</div>
  </div>
</div>

</body>
</html>
