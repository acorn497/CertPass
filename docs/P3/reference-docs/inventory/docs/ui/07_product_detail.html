<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>상품 상세 — 소모품 재고</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-note">07. 상품 상세 + 재고 목록</div>

<!-- App Bar -->
<div class="app-bar">
  <button class="back-button">←</button>
  <h1>상품 상세</h1>
  <button class="app-bar-action" title="상품 수정">✎</button>
  <button class="app-bar-action" title="상품 삭제" style="color:var(--error)">🗑</button>
</div>

<!-- Product Header -->
<div class="detail-header">
  <div class="product-name">서울우유 1L</div>
  <div class="barcode-label">8801234567890</div>
  <div class="total-qty">
    총 재고 <strong>3</strong>개 (2건)
  </div>
</div>

<!-- Inventory Items -->
<div class="inventory-section-title">
  재고 항목
  <button class="add-link">＋ 재고 추가</button>
</div>

<!-- Item 1: expired -->
<div class="inventory-card">
  <div class="inv-top-row">
    <div>
      <div class="inv-details" style="margin:0">
        <span class="inv-tag expired">만료 · 3/10</span>
        <span class="inv-tag">📍 냉장고</span>
      </div>
    </div>
    <div class="inv-qty">
      <div class="inv-qty-controls">
        <button class="inv-qty-btn">−</button>
        <span class="inv-qty-num">1</span>
        <button class="inv-qty-btn">＋</button>
      </div>
    </div>
  </div>
  <div class="inv-memo">이마트 3/5 구매</div>
</div>

<!-- Item 2: normal -->
<div class="inventory-card">
  <div class="inv-top-row">
    <div>
      <div class="inv-details" style="margin:0">
        <span class="inv-tag">📅 3/30까지</span>
        <span class="inv-tag">📍 냉장고</span>
      </div>
    </div>
    <div class="inv-qty">
      <div class="inv-qty-controls">
        <button class="inv-qty-btn">−</button>
        <span class="inv-qty-num">2</span>
        <button class="inv-qty-btn">＋</button>
      </div>
    </div>
  </div>
  <div class="inv-memo">쿠팡 3/12 구매</div>
</div>

<div style="height:80px"></div>

</body>
</html>
