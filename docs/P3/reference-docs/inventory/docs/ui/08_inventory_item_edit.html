<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>재고 수정 — 소모품 재고</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-note">08. 재고 항목 수정</div>

<!-- App Bar -->
<div class="app-bar">
  <button class="back-button">←</button>
  <h1>재고 수정</h1>
</div>

<div class="form-body">
  <!-- Parent Product (read-only) -->
  <div class="form-group">
    <label class="form-label">상품</label>
    <input type="text" class="form-input readonly" value="서울우유 1L" readonly>
  </div>

  <!-- Quantity -->
  <div class="form-group">
    <label class="form-label">수량</label>
    <div class="quantity-stepper">
      <button class="qty-btn">−</button>
      <input type="number" class="qty-value" value="1">
      <button class="qty-btn">＋</button>
    </div>
  </div>

  <!-- Expiration Date -->
  <div class="form-group">
    <label class="form-label">사용기한</label>
    <div class="expiry-toggle-row">
      <button class="toggle" title="무기한"></button>
      <span class="expiry-toggle-label">무기한</span>
    </div>
    <input type="date" class="form-input" value="2026-03-10">
  </div>

  <!-- Storage Location -->
  <div class="form-group">
    <label class="form-label">저장 위치</label>
    <select class="location-select">
      <option value="">선택하세요</option>
      <option value="1" selected>냉장고</option>
      <option value="2">냉동고</option>
      <option value="3">김치냉장고</option>
      <option value="4">창고</option>
      <option value="5">펜트리</option>
      <option value="9">욕실</option>
      <option value="14">싱크대</option>
      <option value="28">기타</option>
    </select>
  </div>

  <!-- Memo -->
  <div class="form-group">
    <label class="form-label">메모</label>
    <textarea class="form-input">이마트 3/5 구매</textarea>
  </div>

  <!-- Danger Zone -->
  <div style="margin-top:24px">
    <button class="btn btn-danger" style="width:100%">이 재고 항목 삭제</button>
  </div>
</div>

<!-- Bottom Actions -->
<div class="bottom-actions">
  <button class="btn btn-secondary">취소</button>
  <button class="btn btn-primary">저장</button>
</div>

</body>
</html>
