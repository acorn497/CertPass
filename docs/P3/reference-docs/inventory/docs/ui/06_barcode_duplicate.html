<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>기존 상품 발견 — 소모품 재고</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-note">06. 바코드 스캔 → 기존 상품 발견 (F-ITEM-05)</div>

<!-- App Bar -->
<div class="app-bar">
  <button class="back-button">←</button>
  <h1>재고 추가</h1>
</div>

<div class="form-body">
  <!-- Existing Product Found -->
  <div style="margin-bottom:20px">
    <div style="font-size:13px; color:var(--primary); font-weight:600; margin-bottom:8px">
      ✓ 등록된 상품을 찾았습니다
    </div>
    <div class="dup-product-card">
      <div class="dup-info">
        <strong>서울우유 1L</strong>
        <span>8801234567890 · 현재 재고 1건</span>
      </div>
    </div>
  </div>

  <hr style="border:none; border-top:1px solid var(--outline); margin:0 0 24px">
  <div style="font-size:14px; font-weight:600; color:var(--on-surface-secondary); margin-bottom:16px">새 재고 추가</div>

  <!-- Quantity -->
  <div class="form-group">
    <label class="form-label">수량</label>
    <div class="quantity-stepper">
      <button class="qty-btn">−</button>
      <input type="number" class="qty-value" value="1">
      <button class="qty-btn">＋</button>
    </div>
  </div>

  <!-- Expiration Date -->
  <div class="form-group">
    <label class="form-label">사용기한</label>
    <div class="expiry-toggle-row">
      <button class="toggle" title="무기한"></button>
      <span class="expiry-toggle-label">무기한</span>
    </div>
    <input type="date" class="form-input" value="2026-03-30">
  </div>

  <!-- Storage Location -->
  <div class="form-group">
    <label class="form-label">저장 위치</label>
    <select class="location-select">
      <option value="">선택하세요</option>
      <option value="1" selected>냉장고</option>
      <option value="2">냉동고</option>
      <option value="3">김치냉장고</option>
      <option value="4">창고</option>
    </select>
  </div>

  <!-- Memo -->
  <div class="form-group">
    <label class="form-label">메모</label>
    <textarea class="form-input" placeholder="구매처, 구매일, 특이사항 등">쿠팡 3/12 구매</textarea>
  </div>
</div>

<!-- Bottom Actions -->
<div class="bottom-actions">
  <button class="btn btn-secondary">취소</button>
  <button class="btn btn-primary">재고 추가</button>
</div>

</body>
</html>
