<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>빈 상태 — 소모품 재고</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page-note">11. 빈 상태 (최초 진입)</div>

<!-- App Bar -->
<div class="app-bar">
  <h1>우리집 재고</h1>
  <button class="app-bar-action" title="설정">⚙</button>
</div>

<!-- Search -->
<div class="search-bar">
  <div class="search-input-wrap">
    <span class="icon">🔍</span>
    <input type="text" placeholder="상품명으로 검색">
  </div>
  <button class="scan-button" title="바코드 스캔 검색">📷</button>
</div>

<!-- Empty State -->
<div class="empty-state">
  <div class="empty-icon">📦</div>
  <p>
    등록된 상품이 없습니다<br>
    <span style="color:var(--primary); font-weight:600">＋ 버튼</span>을 눌러<br>
    첫 번째 상품을 등록해보세요
  </p>
</div>

<!-- FAB -->
<button class="fab" title="상품 추가">＋</button>

</body>
</html>
