<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>바코드 스캔 — 소모품 재고</title>
<link rel="stylesheet" href="styles.css">
</head>
<body style="background:#000">

<div class="page-note">03. 바코드 스캔</div>

<!-- App Bar (transparent over camera) -->
<div class="app-bar" style="background:transparent; border:none; position:absolute; z-index:10; width:100%">
  <button class="back-button" style="color:white">←</button>
  <h1 style="color:white">바코드 스캔</h1>
</div>

<!-- Camera Viewport -->
<div class="scanner-viewport">
  <div class="fake-camera">
    <div class="scan-guide"></div>
  </div>
  <div class="scanner-hint">
    바코드를 사각형 안에 맞춰주세요
  </div>
</div>

<!-- Bottom Area -->
<div class="scanner-bottom">
  <button class="manual-input-link">바코드 번호 직접 입력</button>
</div>

</body>
</html>
