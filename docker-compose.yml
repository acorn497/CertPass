services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - p3_mongo:/data/db

  server:
    build:
      context: ./Project3/server
    env_file:
      - ./Project3/.env.example
    environment:
      MONGODB_URI: mongodb://mongo:27017/p3_learning
      CLIENT_URL: http://localhost:5173
      # TossPayments 공개 테스트 키 (https://developers.tosspayments.com/)
      TOSS_CLIENT_KEY: test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm
      TOSS_SECRET_KEY: test_gsk_docs_OaPz8L5KdmQXkzRz3y47BMw6
      PAYMENT_CURRENCY: KRW
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  client:
    build:
      context: ./Project3/client
      args:
        VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  p3_mongo:
