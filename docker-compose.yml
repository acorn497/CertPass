services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - p3_mongo:/data/db

  server:
    build:
      context: ./Project3/server
    env_file:
      - ./Project3/.env.example
    environment:
      MONGODB_URI: mongodb://mongo:27017/p3_learning
      CLIENT_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  client:
    build:
      context: ./Project3/client
      args:
        VITE_API_URL: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  p3_mongo:
